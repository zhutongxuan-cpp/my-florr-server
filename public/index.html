<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>My Florr.io - 多人联机版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #181818; }
        canvas { display: block; }
    </style>
</head>
<body oncontextmenu="return false;">
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 🌟 1. 一次性加载所有三张图片 🌟
        const imgNormal = new Image(); imgNormal.src = '/img/player.png';
        const imgAttack = new Image(); imgAttack.src = '/img/player-attack.png';
        const imgDefend = new Image(); imgDefend.src = '/img/player-defense.png';

        const socket = io();
        let otherPlayers = {}; 

        socket.on('gameState', (serverPlayers) => {
            otherPlayers = serverPlayers;
        });

        // 🌺 我的本地玩家数据
        const player = {
            screenX: canvas.width / 2,
            screenY: canvas.height / 2,
            worldX: 0,
            worldY: 0,
            
            petalCount: 5,
            normalDistance: 45,
            attackDistance: 90,
            defendDistance: 25,
            currentDistance: 45,
            targetDistance: 45,
            rotationAngle: 0,
            rotationSpeed: 0.05,
            facingAngle: 0,   // 新增：眼睛朝向
            state: 'normal',  // 新增：当前表情状态

            maxSpeed: 6,
            maxMouseDist: 150,
            mouseX: canvas.width / 2,
            mouseY: canvas.height / 2
        };

        const mouseState = { left: false, right: false };

        window.addEventListener('mousemove', (e) => {
            player.mouseX = e.clientX;
            player.mouseY = e.clientY;
        });

        // 🌟 2. 根据鼠标左右键切换 targetDistance 和 state(表情) 🌟
        function updateStance() {
            if (mouseState.left) {
                player.targetDistance = player.attackDistance;
                player.state = 'attack';
            } else if (mouseState.right) {
                player.targetDistance = player.defendDistance;
                player.state = 'defend';
            } else {
                player.targetDistance = player.normalDistance;
                player.state = 'normal';
            }
        }

        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) mouseState.left = true;
            if (e.button === 2) mouseState.right = true;
            updateStance();
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouseState.left = false;
            if (e.button === 2) mouseState.right = false;
            updateStance();
        });

        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 2;
            const gridSize = 50;
            const offsetX = -player.worldX % gridSize;
            const offsetY = -player.worldY % gridSize;

            ctx.beginPath();
            for (let x = offsetX - gridSize; x < canvas.width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            for (let y = offsetY - gridSize; y < canvas.height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        function drawPlayer(x, y, pData, isMe) {
            // 画花瓣
            for (let i = 0; i < pData.petalCount; i++) {
                const angle = pData.rotationAngle + (i * (Math.PI * 2) / pData.petalCount);
                const petalX = x + Math.cos(angle) * pData.currentDistance;
                const petalY = y + Math.sin(angle) * pData.currentDistance;

                ctx.beginPath();
                ctx.arc(petalX, petalY, 10, 0, Math.PI * 2); 
                ctx.fillStyle = isMe ? '#FF69B4' : '#FF8C00'; 
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#000';
                ctx.stroke();
            }

            // 🌟 3. 根据状态选择对应的图片 🌟
            let currentImg = imgNormal;
            if (pData.state === 'attack') currentImg = imgAttack;
            else if (pData.state === 'defend') currentImg = imgDefend;

            // 🌟 4. 让本体图片旋转，面向鼠标方向 🌟
            const imgSize = 40;
            ctx.save();
            ctx.translate(x, y); 
            
            // 旋转画布！
            // 【注意】如果你发现虫子的眼睛往上瞟，把下面改成: ctx.rotate(pData.facingAngle + Math.PI / 2);
            ctx.rotate(pData.facingAngle); 

            if (currentImg.complete) {
                ctx.drawImage(currentImg, -imgSize / 2, -imgSize / 2, imgSize, imgSize);
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2); 
                ctx.fillStyle = '#FFD700'; 
                ctx.fill();
            }
            ctx.restore();
        }

        // 🌟 修复卡死：不再等待 socket connect，立刻启动游戏循环 🌟
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const dx = player.mouseX - player.screenX;
            const dy = player.mouseY - player.screenY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // 🌟 5. 计算本地玩家视线的朝向角度 🌟
            player.facingAngle = Math.atan2(dy, dx);

            if (dist > 0) {
                const speedRatio = Math.min(dist / player.maxMouseDist, 1);
                const currentSpeed = player.maxSpeed * speedRatio;
                player.worldX += (dx / dist) * currentSpeed;
                player.worldY += (dy / dist) * currentSpeed;
            }

            player.rotationAngle += player.rotationSpeed;
            player.currentDistance += (player.targetDistance - player.currentDistance) * 0.15;

            // 发送所有最新状态给服务器 (包括表情和朝向)
            socket.emit('playerUpdate', {
                worldX: player.worldX,
                worldY: player.worldY,
                currentDistance: player.currentDistance,
                rotationAngle: player.rotationAngle,
                facingAngle: player.facingAngle,
                state: player.state
            });

            drawGrid();

            // 绘制半透明引导箭头
            if (dist > 10) {
                ctx.save();
                ctx.translate(player.screenX, player.screenY);
                ctx.rotate(player.facingAngle);

                const shaftWidth = 6;
                const headWidth = 20;
                const actualHeadLength = Math.min(18, dist); 
                const shaftLength = dist - actualHeadLength;

                ctx.beginPath();
                ctx.moveTo(0, -shaftWidth / 2);
                ctx.lineTo(shaftLength, -shaftWidth / 2);
                ctx.lineTo(shaftLength, -headWidth / 2);
                ctx.lineTo(dist, 0); 
                ctx.lineTo(shaftLength, headWidth / 2);
                ctx.lineTo(shaftLength, shaftWidth / 2);
                ctx.lineTo(0, shaftWidth / 2);
                ctx.closePath();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.fill();
                ctx.restore();
            }

            // 渲染所有在线玩家
            for (let id in otherPlayers) {
                const p = otherPlayers[id];
                if (id === socket.id) {
                    drawPlayer(player.screenX, player.screenY, player, true);
                } else {
                    const drawX = player.screenX + (p.worldX - player.worldX);
                    const drawY = player.screenY + (p.worldY - player.worldY);
                    
                    if (drawX > -100 && drawX < canvas.width + 100 &&
                        drawY > -100 && drawY < canvas.height + 100) {
                        drawPlayer(drawX, drawY, p, false);
                    }
                }
            }
            requestAnimationFrame(gameLoop);
        }

        // 直接启动游戏，不被网络延迟卡死
        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.screenX = canvas.width / 2;
            player.screenY = canvas.height / 2;
        });
    </script>
</body>
</html>
