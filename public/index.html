<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>My Florr.io - 多人联机版</title>
    <style>
        :root {
            --bg1: #111827;
            --bg2: #1f2937;
            --panel: rgba(20, 24, 35, 0.88);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #f3f4f6;
            --subtext: #cbd5e1;
            --green: #22c55e;
            --green-hover: #16a34a;
            --blue: #3b82f6;
            --blue-hover: #2563eb;
            --red: #ef4444;
            --red-hover: #dc2626;
            --yellow: #f59e0b;
            --gray: #6b7280;
            --input-bg: rgba(255, 255, 255, 0.08);
            --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, #243b55 0%, transparent 35%),
                radial-gradient(circle at top right, #1d4ed8 0%, transparent 28%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #authPanel {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(5, 8, 15, 0.45);
            backdrop-filter: blur(8px);
            z-index: 20;
        }

        .auth-box {
            width: 380px;
            padding: 28px;
            border-radius: 22px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow);
        }

        .auth-title {
            margin: 0 0 10px;
            text-align: center;
            font-size: 30px;
            font-weight: 800;
        }

        .auth-subtitle {
            margin: 0 0 22px;
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            line-height: 1.6;
        }

        .auth-box label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #dbeafe;
        }

        .auth-box input {
            width: 100%;
            margin-bottom: 14px;
            padding: 13px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: var(--input-bg);
            color: white;
            outline: none;
            font-size: 15px;
        }

        .auth-box input:focus {
            border-color: rgba(96, 165, 250, 0.9);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.18);
        }

        .auth-hint {
            margin-top: -4px;
            margin-bottom: 14px;
            color: #93c5fd;
            font-size: 12px;
            line-height: 1.5;
        }

        .auth-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .auth-box button {
            flex: 1;
            padding: 12px 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            color: white;
        }

        #loginBtn { background: var(--green); }
        #loginBtn:hover { background: var(--green-hover); }

        #registerBtn { background: var(--blue); }
        #registerBtn:hover { background: var(--blue-hover); }

        #authMessage {
            min-height: 24px;
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #fcd34d;
        }

        #topBar {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .top-left {
            display: flex;
            gap: 10px;
            align-items: center;
            pointer-events: auto;
        }

        .top-card {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 14px;
            background: rgba(17, 24, 39, 0.72);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
        }

        #welcomeText {
            font-size: 14px;
            color: #e5e7eb;
        }

        #connectionStatus {
            font-size: 13px;
            font-weight: 700;
            color: white;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gray);
            flex-shrink: 0;
        }

        .status-connected .status-dot { background: var(--green); }
        .status-connecting .status-dot { background: var(--yellow); }
        .status-disconnected .status-dot { background: var(--red); }
        .status-reconnected .status-dot { background: #22d3ee; }

        #logoutBtn {
            pointer-events: auto;
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            background: var(--red);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        #logoutBtn:hover { background: var(--red-hover); }

        #loadingMask {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 14, 24, 0.55);
            color: white;
            font-size: 18px;
            font-weight: 700;
            z-index: 30;
        }

        #wasmStatus {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 12;
            padding: 8px 12px;
            border-radius: 12px;
            background: rgba(17, 24, 39, 0.72);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            font-size: 12px;
            color: #cbd5e1;
            pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="loadingMask">正在检查登录状态...</div>

    <div id="topBar">
        <div class="top-left">
            <div class="top-card">
                <span id="welcomeText">未登录</span>
            </div>
            <div class="top-card status-disconnected" id="connectionStatusCard">
                <span class="status-dot"></span>
                <span id="connectionStatus">已断开</span>
            </div>
        </div>
        <button id="logoutBtn">退出登录</button>
    </div>

    <div id="authPanel">
        <div class="auth-box">
            <h1 class="auth-title">My Florr.io</h1>
            <p class="auth-subtitle">登录或注册后进入花瓣世界</p>

            <label for="usernameInput">用户名</label>
            <input id="usernameInput" class="textInput" type="text" maxlength="15" placeholder="请输入用户名" autocomplete="username" spellcheck="false">
            <div class="auth-hint">3-15位，只能包含中文、字母、数字、下划线</div>

            <label for="passwordInput">密码</label>
            <input id="passwordInput" class="textInput" type="password" maxlength="15" placeholder="请输入密码" autocomplete="current-password" spellcheck="false">
            <div class="auth-hint">5-15位，必须同时包含字母和数字</div>

            <div class="auth-actions">
                <button id="loginBtn">登录</button>
                <button id="registerBtn">注册</button>
            </div>

            <div id="authMessage"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="wasmStatus">WASM 花瓣：未启动</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                const radius = typeof r === 'number' ? r : 0;
                this.moveTo(x + radius, y);
                this.lineTo(x + w - radius, y);
                this.quadraticCurveTo(x + w, y, x + w, y + radius);
                this.lineTo(x + w, y + h - radius);
                this.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
                this.lineTo(x + radius, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - radius);
                this.lineTo(x, y + radius);
                this.quadraticCurveTo(x, y, x + radius, y);
                return this;
            };
        }

        const authPanel = document.getElementById('authPanel');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const authMessage = document.getElementById('authMessage');
        const topBar = document.getElementById('topBar');
        const welcomeText = document.getElementById('welcomeText');
        const logoutBtn = document.getElementById('logoutBtn');
        const loadingMask = document.getElementById('loadingMask');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionStatusCard = document.getElementById('connectionStatusCard');
        const wasmStatus = document.getElementById('wasmStatus');

        let socket = null;
        let loggedIn = false;
        let currentUsername = '';
        let otherPlayers = {};
        let remoteLogoutHandled = false;
        let hadConnectedBefore = false;
        let reconnecting = false;
        let wasmInitStarted = false;
        let wasmInitPromise = null;

        let logicalWidth = window.innerWidth;
        let logicalHeight = window.innerHeight;

        function setAuthMessage(msg, color = '#fcd34d') {
            authMessage.textContent = msg;
            authMessage.style.color = color;
        }

        function setConnectionStatus(text, type) {
            connectionStatus.textContent = text;
            connectionStatusCard.className = `top-card status-${type}`;
        }

        function focusAuthInputs() {
            setTimeout(() => {
                if (authPanel.style.display !== 'none') {
                    usernameInput.focus();
                }
            }, 50);
        }

        async function fetchJSON(url, options = {}) {
            const res = await fetch(url, {
                credentials: 'same-origin',
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                }
            });
            return res.json();
        }

        function makePetalCard(petalId = 1, rarity = 0) {
            return {
                petalId,
                rarity,
                name: 'Basic'
            };
        }

        const loadoutState = {
            slotRects: Array.from({ length: 5 }, () => ({ x: 0, y: 0, width: 0, height: 0 })),
            slots: Array.from({ length: 5 }, () => makePetalCard(1, 0))
        };

        const player = {
            username: '',
            screenX: 0,
            screenY: 0,
            worldX: 0,
            worldY: 0,
            petalCount: 5,
            normalDistance: 45,
            attackDistance: 90,
            defendDistance: 36,
            currentDistance: 45,
            targetDistance: 45,
            rotationAngle: 0,
            rotationSpeed: 0.05,
            facingAngle: 0,
            attackBlend: 0,
            defendBlend: 0,
            targetAttackBlend: 0,
            targetDefendBlend: 0,
            maxSpeed: 6,
            maxMouseDist: 150,
            mouseX: 0,
            mouseY: 0,
            inventory: []
        };

        const inventoryState = {
            open: false,
            hoverButton: false,
            buttonRect: { x: 0, y: 0, width: 0, height: 0 },
            closeRect: { x: 0, y: 0, width: 0, height: 0 },
            panelRect: { x: 0, y: 0, width: 0, height: 0 },
            cardRects: []
        };

        const dragState = {
            active: false,
            source: null,
            item: null,
            count: 0,
            pointerX: 0,
            pointerY: 0,
            angle: 0,
            angleDir: 1,
            hoverSlotIndex: -1,
            reopenInventoryAfterDrop: false
        };

        const mouseState = { left: false, right: false };

        const PETAL_NAME_BY_ID = { 1: 'Basic' };
        const RARITY_NAME_BY_LEVEL = {
            0: 'Common',
            1: 'Uncommon',
            2: 'Rare',
            3: 'Epic',
            4: 'Legendary',
            5: 'Mythic'
        };

        function syncPetalCountFromLoadout() {
            player.petalCount = loadoutState.slots.filter(Boolean).length;
        }

        function applyPlayerData(data) {
            const inv = Array.isArray(data?.inventory) ? data.inventory : [];
            const loadout = Array.isArray(data?.loadout) ? data.loadout : [];

            player.inventory = inv.map(clonePetalItem);

            loadoutState.slots = Array.from({ length: 5 }, (_, i) => {
                const item = loadout[i];
                return item ? clonePetalItem(item) : null;
            });

            while (loadoutState.slots.length < 5) loadoutState.slots.push(null);
            syncPetalCountFromLoadout();
        }

        function serializePlayerData() {
            return {
                inventory: player.inventory.map(clonePetalItem),
                loadout: loadoutState.slots.map(item => item ? clonePetalItem(item) : null)
            };
        }

        async function savePlayerData() {
            if (!loggedIn) return;
            try {
                await fetchJSON('/api/player-data', {
                    method: 'POST',
                    body: JSON.stringify(serializePlayerData())
                });
            } catch (err) {
                console.error('保存玩家数据失败:', err);
            }
        }

        function resetPlayerState() {
            player.worldX = 0;
            player.worldY = 0;
            player.currentDistance = player.normalDistance;
            player.targetDistance = player.normalDistance;
            player.rotationAngle = 0;
            player.facingAngle = 0;
            player.attackBlend = 0;
            player.defendBlend = 0;
            player.targetAttackBlend = 0;
            player.targetDefendBlend = 0;

            player.inventory = [];
            loadoutState.slots = Array.from({ length: 5 }, () => makePetalCard(1, 0));
            syncPetalCountFromLoadout();

            inventoryState.open = false;
            inventoryState.hoverButton = false;
            inventoryState.cardRects = [];
            dragState.active = false;
            dragState.source = null;
            dragState.item = null;
            dragState.count = 0;
            dragState.hoverSlotIndex = -1;
            dragState.angle = 0;
            dragState.angleDir = 1;
            dragState.reopenInventoryAfterDrop = false;
            mouseState.left = false;
            mouseState.right = false;
            otherPlayers = {};
        }

        function showAuthPanel() {
            authPanel.style.display = 'flex';
            topBar.style.display = 'none';
            loggedIn = false;
            otherPlayers = {};
            focusAuthInputs();
        }

        function hideAuthPanel() {
            authPanel.style.display = 'none';
            topBar.style.display = 'flex';
        }

        function setWasmStatus(text) {
            wasmStatus.textContent = text;
        }

        async function ensureWasmStarted() {
            if (wasmInitStarted) return wasmInitPromise;
            wasmInitStarted = true;
            wasmInitPromise = initWasm();
            return wasmInitPromise;
        }

        async function loadPlayerDataFromServer() {
            const result = await fetchJSON('/api/player-data', { method: 'GET' });
            if (result.success) {
                applyPlayerData(result.data);
            }
        }

        async function onLoginSuccess(username) {
            remoteLogoutHandled = false;
            currentUsername = username;
            loggedIn = true;
            welcomeText.textContent = `欢迎：${username}`;
            hideAuthPanel();

            await ensureWasmStarted();
            await loadPlayerDataFromServer();
            connectSocket();
        }

        function disconnectSocket() {
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        }

        async function forceBackToLogin(message) {
            if (remoteLogoutHandled) return;
            remoteLogoutHandled = true;

            disconnectSocket();
            resetPlayerState();

            const oldUsername = currentUsername;
            loggedIn = false;
            currentUsername = '';
            hadConnectedBefore = false;
            reconnecting = false;

            setConnectionStatus('已断开', 'disconnected');
            showAuthPanel();

            usernameInput.value = oldUsername || '';
            passwordInput.value = '';
            setAuthMessage(message || '登录已失效，请重新登录', '#fca5a5');
        }

        function connectSocket() {
            disconnectSocket();

            setConnectionStatus('连接中', 'connecting');
            reconnecting = false;

            socket = io({
                reconnection: true,
                reconnectionAttempts: Infinity,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                timeout: 10000
            });

            socket.on('connect', () => {
                otherPlayers = {};
                remoteLogoutHandled = false;

                if (hadConnectedBefore || reconnecting) {
                    setConnectionStatus('已重连', 'reconnected');
                } else {
                    setConnectionStatus('已连接', 'connected');
                }

                hadConnectedBefore = true;
                reconnecting = false;
            });

            socket.on('gameState', (serverPlayers) => {
                otherPlayers = serverPlayers || {};

                if (socket && socket.id && otherPlayers[socket.id]) {
                    const me = otherPlayers[socket.id];
                    player.worldX = Number(me.worldX) || 0;
                    player.worldY = Number(me.worldY) || 0;
                    player.currentDistance = Number(me.currentDistance) || player.normalDistance;
                    player.rotationAngle = Number(me.rotationAngle) || 0;
                    player.facingAngle = Number(me.facingAngle) || 0;
                    player.attackBlend = Number(me.attackBlend) || 0;
                    player.defendBlend = Number(me.defendBlend) || 0;
                }
            });

            socket.on('sessionReplaced', async (data) => {
                const msg = data?.message || '你的账号已在其他地方登录';
                await forceBackToLogin(msg);
            });

            socket.io.on('reconnect_attempt', () => {
                reconnecting = true;
                setConnectionStatus('连接中', 'connecting');
            });

            socket.io.on('reconnect', () => {
                reconnecting = false;
                setConnectionStatus('已重连', 'reconnected');
            });

            socket.on('connect_error', async () => {
                reconnecting = true;
                setConnectionStatus('连接中', 'connecting');

                try {
                    const result = await fetchJSON('/api/me', { method: 'GET' });
                    if (!result.loggedIn) {
                        await forceBackToLogin('登录已失效，请重新登录');
                    }
                } catch (e) {
                    console.error(e);
                }
            });

            socket.on('disconnect', async (reason) => {
                if (reason === 'io client disconnect') {
                    setConnectionStatus('已断开', 'disconnected');
                    return;
                }

                if (reason === 'io server disconnect') {
                    setConnectionStatus('已断开', 'disconnected');
                    try {
                        const result = await fetchJSON('/api/me', { method: 'GET' });
                        if (!result.loggedIn) {
                            await forceBackToLogin('你的登录状态已失效，请重新登录');
                        } else {
                            reconnecting = true;
                            setConnectionStatus('连接中', 'connecting');
                            connectSocket();
                        }
                    } catch (e) {
                        console.error(e);
                    }
                    return;
                }

                reconnecting = true;
                setConnectionStatus('连接中', 'connecting');
            });
        }

        async function checkLoginStatus() {
            try {
                const result = await fetchJSON('/api/me', { method: 'GET' });
                loadingMask.style.display = 'none';

                if (result.loggedIn && result.username) {
                    await onLoginSuccess(result.username);
                } else {
                    showAuthPanel();
                    setConnectionStatus('已断开', 'disconnected');
                }
            } catch (err) {
                console.error(err);
                loadingMask.style.display = 'none';
                showAuthPanel();
                setAuthMessage('无法连接服务器', '#fca5a5');
                setConnectionStatus('已断开', 'disconnected');
            }
        }

        async function handleLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                setAuthMessage('请输入用户名和密码');
                return;
            }

            loginBtn.disabled = true;
            registerBtn.disabled = true;
            setAuthMessage('正在登录...', '#93c5fd');

            try {
                const result = await fetchJSON('/api/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });

                if (!result.success) {
                    setAuthMessage(result.message, '#fca5a5');
                    return;
                }

                setAuthMessage(result.message, '#86efac');
                passwordInput.value = '';
                await onLoginSuccess(result.username);
            } catch (err) {
                console.error(err);
                setAuthMessage('登录请求失败', '#fca5a5');
            } finally {
                loginBtn.disabled = false;
                registerBtn.disabled = false;
            }
        }

        async function handleRegister() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                setAuthMessage('请输入用户名和密码');
                return;
            }

            loginBtn.disabled = true;
            registerBtn.disabled = true;
            setAuthMessage('正在注册...', '#93c5fd');

            try {
                const result = await fetchJSON('/api/register', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });

                if (!result.success) {
                    setAuthMessage(result.message, '#fca5a5');
                    return;
                }

                setAuthMessage(result.message, '#86efac');
                passwordInput.value = '';
            } catch (err) {
                console.error(err);
                setAuthMessage('注册请求失败', '#fca5a5');
            } finally {
                loginBtn.disabled = false;
                registerBtn.disabled = false;
            }
        }

        async function handleLogout() {
            await savePlayerData();
            disconnectSocket();

            try {
                await fetchJSON('/api/logout', {
                    method: 'POST',
                    body: JSON.stringify({})
                });
            } catch (err) {
                console.error(err);
            }

            resetPlayerState();

            usernameInput.value = '';
            passwordInput.value = '';
            currentUsername = '';
            loggedIn = false;
            hadConnectedBefore = false;
            reconnecting = false;
            setConnectionStatus('已断开', 'disconnected');
            setAuthMessage('已退出登录', '#86efac');
            showAuthPanel();
        }

        loginBtn.addEventListener('click', handleLogin);
        registerBtn.addEventListener('click', handleRegister);
        logoutBtn.addEventListener('click', handleLogout);

        usernameInput.addEventListener('keydown', (e) => {
            e.stopPropagation();
            if (e.key === 'Enter') handleLogin();
        });
        passwordInput.addEventListener('keydown', (e) => {
            e.stopPropagation();
            if (e.key === 'Enter') handleLogin();
        });

        [
            'keydown', 'keypress', 'keyup',
            'input', 'beforeinput',
            'paste', 'copy', 'cut',
            'compositionstart', 'compositionupdate', 'compositionend'
        ].forEach(type => {
            usernameInput.addEventListener(type, e => e.stopPropagation(), true);
            passwordInput.addEventListener(type, e => e.stopPropagation(), true);
        });

        function resizeCanvas() {
            logicalWidth = window.innerWidth;
            logicalHeight = window.innerHeight;

            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.round(logicalWidth * dpr);
            canvas.height = Math.round(logicalHeight * dpr);

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            player.screenX = logicalWidth / 2;
            player.screenY = logicalHeight / 2;
            updateInventoryLayout();
        }

        const imgNormal = new Image();
        imgNormal.src = '/img/player-default.png';

        const imgAttack = new Image();
        imgAttack.src = '/img/player-attack.png';

        const imgDefend = new Image();
        imgDefend.src = '/img/player-defense.png';

        const imgNormalEye = new Image();
        imgNormalEye.src = '/img/player-default-eye.png';

        const imgAttackEye = new Image();
        imgAttackEye.src = '/img/player-attack-eye.png';

        const imgDefendEye = new Image();
        imgDefendEye.src = '/img/player-defense-eye.png';

        const imgInventory = new Image();
        imgInventory.src = '/img/Inventory.png';

        function setRect(rect, x, y, width, height) {
            rect.x = x;
            rect.y = y;
            rect.width = width;
            rect.height = height;
        }

        function pointInRect(x, y, rect) {
            return x >= rect.x && x <= rect.x + rect.width && y >= rect.y && y <= rect.y + rect.height;
        }

        function updateInventoryLayout() {
            const buttonSize = 84;
            const buttonMargin = 22;
            setRect(
                inventoryState.buttonRect,
                buttonMargin,
                logicalHeight - buttonSize - buttonMargin,
                buttonSize,
                buttonSize
            );

            const panelWidth = Math.min(980, logicalWidth - 72);
            const panelHeight = Math.min(680, logicalHeight - 72);
            const panelX = Math.round((logicalWidth - panelWidth) / 2);
            const panelY = Math.round((logicalHeight - panelHeight) / 2);
            setRect(inventoryState.panelRect, panelX, panelY, panelWidth, panelHeight);
            setRect(inventoryState.closeRect, panelX + panelWidth - 54, panelY + 18, 36, 36);

            const slotSize = 92;
            const slotGap = 18;
            const totalWidth = slotSize * loadoutState.slotRects.length + slotGap * (loadoutState.slotRects.length - 1);
            const startX = Math.round((logicalWidth - totalWidth) / 2);
            const slotY = logicalHeight - slotSize - 26;
            loadoutState.slotRects.forEach((rect, index) => {
                setRect(rect, startX + index * (slotSize + slotGap), slotY, slotSize, slotSize);
            });
        }

        function getPetalName(petalId) {
            return PETAL_NAME_BY_ID[petalId] || `Petal ${petalId}`;
        }

        function getRarityName(rarity) {
            return RARITY_NAME_BY_LEVEL[rarity] || `R${rarity}`;
        }

        function getSortedInventoryEntries() {
            const grouped = new Map();

            for (const petal of player.inventory) {
                const petalId = Number(petal?.petalId ?? 1) || 1;
                const rarity = Number(petal?.rarity ?? 0) || 0;
                const name = String(petal?.name || getPetalName(petalId));
                const key = `${petalId}:${rarity}`;
                const existing = grouped.get(key);

                if (existing) {
                    existing.count += 1;
                } else {
                    grouped.set(key, { petalId, rarity, name, count: 1 });
                }
            }

            return Array.from(grouped.values()).sort((a, b) => {
                if (a.rarity !== b.rarity) return a.rarity - b.rarity;
                return a.name.localeCompare(b.name, 'en', { sensitivity: 'base' });
            });
        }

        function clonePetalItem(item) {
            return {
                petalId: Number(item?.petalId ?? 1) || 1,
                rarity: Number(item?.rarity ?? 0) || 0,
                name: String(item?.name || getPetalName(item?.petalId ?? 1))
            };
        }

        function addInventoryItem(item) {
            player.inventory.push(clonePetalItem(item));
        }

        function removeOneInventoryItem(petalId, rarity) {
            const index = player.inventory.findIndex(item =>
                Number(item?.petalId ?? 1) === petalId &&
                Number(item?.rarity ?? 0) === rarity
            );
            if (index === -1) return null;
            const [removed] = player.inventory.splice(index, 1);
            return clonePetalItem(removed);
        }

        function getInventoryEntryAtPoint(x, y) {

        function getSlotIndexAtPoint(x, y) {

            }
            return -1;

            dragState.count = 1;
            dragState.pointerX = x;
            dragState.pointerY = y;
            dragState.angle = 0;
            dragState.angleDir = 1;
            dragState.hoverSlotIndex = -1;
            dragState.reopenInventoryAfterDrop = false;
            return true;

        async function finishDragCleanup() {

            dragState.hoverSlotIndex = -1;

        window.addEventListener('keydown', (e) => {

        window.addEventListener('resize', resizeCanvas);

        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';

            const gridSize = 50;
            const offsetX = -player.worldX % gridSize;
            const offsetY = -player.worldY % gridSize;

            ctx.beginPath();
            for (let x = offsetX - gridSize; x < logicalWidth; x += gridSize) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, logicalHeight);
            }
            for (let y = offsetY - gridSize; y < logicalHeight; y += gridSize) {
                ctx.moveTo(0, y);
                ctx.lineTo(logicalWidth, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        function drawUsername(x, y, username) {
            if (!username) return;

            ctx.save();
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillStyle = '#ffffff';
            const textY = y + 40;
            ctx.strokeText(username, x, textY);
            ctx.fillText(username, x, textY);
            ctx.restore();
        }

        function drawInventoryButton() {
            const rect = inventoryState.buttonRect;
            const hovered = inventoryState.hoverButton;

            ctx.save();
            ctx.translate(rect.x, rect.y);

            ctx.fillStyle = hovered ? 'rgba(255,255,255,0.18)' : 'rgba(12,18,29,0.54)';
            ctx.strokeStyle = hovered ? 'rgba(255,255,255,0.42)' : 'rgba(255,255,255,0.18)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(0, 0, rect.width, rect.height, 16);
            ctx.fill();
            ctx.stroke();

            if (imgInventory.complete) {
                const pad = hovered ? 8 : 10;
                ctx.drawImage(imgInventory, pad, pad, rect.width - pad * 2, rect.height - pad * 2);
            }

            ctx.restore();
        }

        function drawInventoryCard(x, y, size, entry) {
            ctx.save();
            ctx.translate(x, y);

            ctx.fillStyle = 'rgba(15, 23, 42, 0.9)';
            ctx.strokeStyle = 'rgba(255,255,255,0.10)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size + 46, 14);
            ctx.fill();
            ctx.stroke();

            const spriteSize = Math.round(size * 0.78);
            const spriteX = Math.round((size - spriteSize) / 2);
            const spriteY = 12;

            drawWasmPetal(
                ctx,
                spriteX + spriteSize / 2,
                spriteY + spriteSize / 2,
                [128, entry.petalId, entry.rarity, 1],
                spriteSize,
                false
            );

            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 15px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText(entry.name, size / 2, size + 18, size - 14);

            ctx.fillStyle = '#cbd5e1';
            ctx.font = '12px Arial';
            ctx.fillText(getRarityName(entry.rarity), size / 2, size + 36, size - 14);

            if (entry.count > 1) {
                ctx.save();
                ctx.translate(size - 22, 22);
                ctx.rotate(Math.PI / 4);
                ctx.fillStyle = 'rgba(15, 23, 42, 0.96)';
                ctx.fillRect(-30, -10, 60, 20);
                ctx.strokeStyle = 'rgba(255,255,255,0.22)';
                ctx.strokeRect(-30, -10, 60, 20);
                ctx.fillStyle = '#fef08a';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`X${entry.count}`, 0, 1);
                ctx.restore();
            }

            ctx.restore();
        }

        function drawLoadoutSlots() {
            loadoutState.slotRects.forEach((rect, index) => {
                const item = loadoutState.slots[index];
                const hovered = dragState.active && dragState.hoverSlotIndex === index;

                ctx.save();
                ctx.translate(rect.x, rect.y);

                ctx.fillStyle = hovered ? 'rgba(255,255,255,0.18)' : 'rgba(10, 15, 26, 0.72)';
                ctx.strokeStyle = hovered ? 'rgba(250, 204, 21, 0.85)' : 'rgba(255,255,255,0.16)';
                ctx.lineWidth = hovered ? 3 : 2;
                ctx.beginPath();
                ctx.roundRect(0, 0, rect.width, rect.height, 18);
                ctx.fill();
                ctx.stroke();

                if (item) {
                    drawWasmPetal(
                        ctx,
                        rect.width / 2,
                        rect.height / 2,
                        [128, item.petalId, item.rarity, 1],
                        68,
                        false
                    );
                }

                ctx.restore();
            });
        }

        function drawInventoryPanel() {
            if (!inventoryState.open) return;

            const panel = inventoryState.panelRect;
            const close = inventoryState.closeRect;
            const entries = getSortedInventoryEntries();
            inventoryState.cardRects = [];

            const columns = Math.max(3, Math.floor((panel.width - 64) / 152));
            const cardWidth = Math.min(132, Math.floor((panel.width - 64 - (columns - 1) * 18) / columns));
            const cardHeight = cardWidth + 46;
            const startX = panel.x + 24;
            const startY = panel.y + 84;

            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
            ctx.fillRect(0, 0, logicalWidth, logicalHeight);

            ctx.fillStyle = 'rgba(15, 23, 42, 0.96)';
            ctx.strokeStyle = 'rgba(255,255,255,0.10)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(panel.x, panel.y, panel.width, panel.height, 22);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('Inventory', panel.x + 24, panel.y + 22);

            ctx.fillStyle = '#cbd5e1';
            ctx.font = '14px Arial';
            ctx.fillText(`Petals ${player.inventory.length}`, panel.x + 24, panel.y + 54);

            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.beginPath();
            ctx.roundRect(close.x, close.y, close.width, close.height, 10);
            ctx.fill();

            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('×', close.x + close.width / 2, close.y + close.height / 2 + 1);

            entries.forEach((entry, index) => {
                const column = index % columns;
                const row = Math.floor(index / columns);
                const cardX = startX + column * (cardWidth + 18);
                const cardY = startY + row * (cardHeight + 18);

                inventoryState.cardRects.push({
                    x: cardX,
                    y: cardY,
                    width: cardWidth,
                    height: cardHeight,

        const wasmHiddenCanvas = document.createElement('canvas');

        function pickBestCanvas(beforeSnapshot, afterSnapshot, startedAt) {
            const beforeIds = new Set(beforeSnapshot.map(x => x.id));

            let candidates = afterSnapshot.filter(x =>
                !beforeIds.has(x.id) &&
                x.lastDrawAt >= startedAt &&
                x.width > 0 &&
                x.height > 0
            );
            if (candidates.length > 0) {
                candidates.sort((a, b) => b.lastDrawAt - a.lastDrawAt);
                return candidates[0].ref;
            }

            candidates = afterSnapshot.filter(x =>
                x.lastDrawAt >= startedAt &&
                x.width > 0 &&
                x.height > 0
            );
            if (candidates.length > 0) {
                candidates.sort((a, b) => b.lastDrawAt - a.lastDrawAt);
                return candidates[0].ref;
            }

            candidates = afterSnapshot.filter(x =>
                x.width > 0 &&
                x.height > 0 &&
                x.ref !== canvas
            );
            if (candidates.length > 0) {
                candidates.sort((a, b) => b.id - a.id);
                return candidates[0].ref;
            }

            return null;

        const petalSpriteCache = new Map();
        const petalSpritePending = new Map();

        function makePetalKey(args) {
            return JSON.stringify(args || []);
        }

        async function renderPetalSprite(args, waitMs = 120) {
            if (!window.__wasmReady) throw new Error('WASM 还没初始化完成');
            if (!Module || typeof Module._Util_GeneratePetalImage !== 'function') {
                throw new Error('未找到 Module._Util_GeneratePetalImage');
            }

            const before = getTrackedCanvasSnapshot();
            const startedAt = performance.now();

            let ret = Module._Util_GeneratePetalImage.apply(null, args);

            if (typeof ret === 'number' && ret > 0) {
                try {
                    const maybeStr = readCString(ret);
                    if (maybeStr && isDataURL(maybeStr)) {
                        const img = new Image();
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = reject;
                            img.src = maybeStr;
                        });
                        return img;
                    }
                } catch (e) {}
            }

            await sleep(waitMs);

            const after = getTrackedCanvasSnapshot();
            const sourceCanvas = pickBestCanvas(before, after, startedAt);

            if (!sourceCanvas) throw new Error('没找到 wasm 实际绘制的 canvas');

            const copy = document.createElement('canvas');
            copy.width = sourceCanvas.width;
            copy.height = sourceCanvas.height;
            copy.getContext('2d').drawImage(sourceCanvas, 0, 0);
            return copy;
        }

        async function getPetalSprite(args) {
            const key = makePetalKey(args);

            if (petalSpriteCache.has(key)) return petalSpriteCache.get(key);
            if (petalSpritePending.has(key)) return petalSpritePending.get(key);

            const task = renderPetalSprite(args).then(sprite => {
                petalSpriteCache.set(key, sprite);
                petalSpritePending.delete(key);
                return sprite;
            }).catch(err => {
                petalSpritePending.delete(key);
                throw err;
            });

            petalSpritePending.set(key, task);
            return task;
        }

        function preloadWasmPetal(args) {
            return getPetalSprite(args);
        }

        function drawPetalFallback(ctx, x, y, radius, isMe) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = isMe ? '#FF69B4' : '#FF8C00';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000';
            ctx.stroke();
        }

        function drawWasmPetal(ctx, x, y, args, drawSize, isMe = false) {
            const key = makePetalKey(args);
            const sprite = petalSpriteCache.get(key);

            if (sprite) {
                const drawX = Math.round(x - drawSize / 2);
                const drawY = Math.round(y - drawSize / 2);
                ctx.drawImage(sprite, drawX, drawY, drawSize, drawSize);
                return true;
            }

            if (!petalSpritePending.has(key) && window.__wasmReady) {
                getPetalSprite(args).catch(err => {
                    console.error(err);
                    setWasmStatus('WASM 花瓣：加载失败');
                });
            }

            drawPetalFallback(ctx, x, y, Math.max(6, drawSize * 0.3), isMe);
            return false;
        }

        function drawRawDraggedWasmCard() {
            if (!dragState.active || !dragState.item) return;

            const size = 118;

            ctx.save();
            ctx.translate(dragState.pointerX, dragState.pointerY);
            ctx.rotate(dragState.angle);

            drawWasmPetal(
                ctx,
                0,
                0,
                [128, dragState.item.petalId, dragState.item.rarity, 1],
                size,
                false
            );

            ctx.restore();
        }

        function getEquippedPetals() {
            return loadoutState.slots.filter(Boolean);
        }

        function drawPlayer(x, y, pData, isMe) {
            const petals = isMe
                ? getEquippedPetals()
                : Array.isArray(pData.loadout) && pData.loadout.length
                    ? pData.loadout.filter(Boolean)
                    : Array.from({ length: pData.petalCount || 0 }, () => makePetalCard(1, 0));

            for (let i = 0; i < petals.length; i++) {
                const petal = petals[i];
                const angle = pData.rotationAngle + (i * (Math.PI * 2) / Math.max(1, petals.length));
                const petalX = Math.round(x + Math.cos(angle) * pData.currentDistance);
                const petalY = Math.round(y + Math.sin(angle) * pData.currentDistance);

                drawWasmPetal(
                    ctx,
                    petalX,
                    petalY,
                    [128, petal.petalId, petal.rarity, 2],
                    50,
                    isMe
                );
            }

            const imgSize = 48;
            const drawX = Math.round(x - imgSize / 2);
            const drawY = Math.round(y - imgSize / 2);

            function drawBodyImg(img, alpha) {
                if (!img.complete || alpha <= 0.01) return;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.drawImage(img, drawX, drawY, imgSize, imgSize);
                ctx.restore();
            }

            const aBlend = pData.attackBlend || 0;
            const dBlend = pData.defendBlend || 0;

            drawBodyImg(imgNormalEye, 1);
            drawBodyImg(imgAttackEye, aBlend);
            drawBodyImg(imgDefendEye, dBlend);

            const scale = imgSize / 96;
            const leftEyeBaseX = -12 * scale;
            const leftEyeBaseY = -7.5 * scale;
            const rightEyeBaseX = 12 * scale;
            const rightEyeBaseY = -7.5 * scale;
            const highlightMove = 6 * scale;
            const facingAngle = pData.facingAngle || 0;
            const offsetX = Math.cos(facingAngle) * highlightMove * 0.65;
            const offsetY = Math.sin(facingAngle) * highlightMove * 1.15;
            const highlightRadius = 5 * scale;

            ctx.save();
            ctx.fillStyle = 'white';

            ctx.beginPath();
            ctx.arc(x + leftEyeBaseX + offsetX, y + leftEyeBaseY + offsetY, highlightRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x + rightEyeBaseX + offsetX, y + rightEyeBaseY + offsetY, highlightRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            drawBodyImg(imgNormal, 1);
            drawBodyImg(imgAttack, aBlend);
            drawBodyImg(imgDefend, dBlend);

            drawUsername(x, y, pData.username);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, logicalWidth, logicalHeight);

            if (dragState.active) {
                dragState.angle += 0.035 * dragState.angleDir;
                if (dragState.angle > 0.18 || dragState.angle < -0.18) {
                    dragState.angleDir *= -1;
                }
            }

            if (loggedIn) {
                player.username = currentUsername;
                syncPetalCountFromLoadout();

                const dx = player.mouseX - player.screenX;
                const dy = player.mouseY - player.screenY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0.0001) {
                    player.facingAngle = Math.atan2(dy, dx);
                }

                if (socket && socket.connected) {
                    socket.emit('playerInput', {
                        mouseDX: dx,
                        mouseDY: dy,
                        leftDown: mouseState.left,
                        rightDown: mouseState.right,
                        loadout: loadoutState.slots.map(item => item ? clonePetalItem(item) : null)
                    });
                }

                drawGrid();

                if (dist > 10) {
                    ctx.save();
                    ctx.translate(player.screenX, player.screenY);
                    ctx.rotate(player.facingAngle);

                    const shaftWidth = 6;
                    const headWidth = 20;
                    const actualHeadLength = Math.min(18, dist);
                    const shaftLength = dist - actualHeadLength;

                    ctx.beginPath();
                    ctx.moveTo(0, -shaftWidth / 2);
                    ctx.lineTo(shaftLength, -shaftWidth / 2);
                    ctx.lineTo(shaftLength, -headWidth / 2);
                    ctx.lineTo(dist, 0);
                    ctx.lineTo(shaftLength, headWidth / 2);
                    ctx.lineTo(shaftLength, shaftWidth / 2);
                    ctx.lineTo(0, shaftWidth / 2);
                    ctx.closePath();

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                    ctx.fill();
                    ctx.restore();
                }

                for (let id in otherPlayers) {
                    const p = otherPlayers[id];
                    if (!p) continue;

                    if (socket && id === socket.id) {
                        drawPlayer(player.screenX, player.screenY, {
                            ...player,
                            username: currentUsername,
                            petalCount: loadoutState.slots.filter(Boolean).length,
                            loadout: loadoutState.slots
                        }, true);
                        continue;
                    }

                    const drawX = player.screenX + (p.worldX - player.worldX);
                    const drawY = player.screenY + (p.worldY - player.worldY);

                    if (
                        drawX > -100 && drawX < logicalWidth + 100 &&
                        drawY > -100 && drawY < logicalHeight + 100
                    ) {
                        drawPlayer(drawX, drawY, p, false);
                    }
                }

                drawLoadoutSlots();
                drawInventoryButton();
                drawInventoryPanel();
                drawRawDraggedWasmCard();
            } else {
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(0, 0, logicalWidth, logicalHeight);
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        function loadWasmClientScript() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = './client.js';
                script.onload = resolve;
                script.onerror = () => reject(new Error('client.js 加载失败'));
                document.body.appendChild(script);
            });
        }

        async function initWasm() {
            try {
                setWasmStatus('WASM 花瓣：加载 client.js 中...');
                await loadWasmClientScript();

                let waited = 0;
                while (!window.__wasmReady && waited < 15000) {
                    await sleep(100);
                    waited += 100;
                }

                if (!window.__wasmReady) {
                    setWasmStatus('WASM 花瓣：初始化超时');
                    console.error('WASM 初始化超时');
                }
            } catch (e) {
                setWasmStatus('WASM 花瓣：加载失败');
                console.error(e);
            }
        }

        resetPlayerState();
        checkLoginStatus();
        gameLoop();
    </script>
</body>
