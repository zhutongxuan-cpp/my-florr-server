<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>My Florr Game</title>
    <style>
        /* 让画布占满整个屏幕，去掉滚动条 */
        body { margin: 0; overflow: hidden; background-color: #e0e0e0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- 引入 Socket.io 客户端 -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let players = {};
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        // 窗口大小自适应
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 监听鼠标移动，实时把“相对屏幕中心”的偏移量发给服务器
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            socket.emit('move', {
                dx: mouseX - canvas.width / 2,
                dy: mouseY - canvas.height / 2
            });
        });

        // 接收服务器发来的最新所有玩家坐标
        socket.on('update', (serverPlayers) => {
            players = serverPlayers;
        });

        // 渲染函数
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const myPlayer = players[socket.id];

            // 画鼠标指示线 (视觉效果：从屏幕中心连到鼠标当前位置，无长度限制)
            if (myPlayer) {
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, canvas.height / 2); // 玩家始终在屏幕中心
                ctx.lineTo(mouseX, mouseY); // 直达鼠标
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // 画所有的玩家和他们的花瓣
            for (let id in players) {
                let p = players[id];
                
                // 镜头跟随核心逻辑：
                // 如果是我自己，就画在屏幕正中心 (canvas.width / 2)
                // 如果是别人，计算他与我的“相对坐标”画在屏幕上
                let drawX = canvas.width / 2;
                let drawY = canvas.height / 2;
                
                if (myPlayer && id !== socket.id) {
                    drawX += (p.x - myPlayer.x);
                    drawY += (p.y - myPlayer.y);
                }

                // 画 5 片花瓣
                let numPetals = 5;
                for (let i = 0; i < numPetals; i++) {
                    let angle = p.angle + (i * Math.PI * 2) / numPetals;
                    // 花瓣距离本体的距离为 35
                    let petalX = drawX + Math.cos(angle) * 35;
                    let petalY = drawY + Math.sin(angle) * 35;
                    
                    ctx.beginPath();
                    ctx.arc(petalX, petalY, 12, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffcc00'; // 花瓣颜色（黄色）
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#000';
                    ctx.stroke();
                }

                // 画玩家本体 (绿色的圆)
                ctx.beginPath();
                ctx.arc(drawX, drawY, 20, 0, Math.PI * 2);
                ctx.fillStyle = '#33cc33'; 
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#000';
                ctx.stroke();
            }

            // 让浏览器不停地画下一帧
            requestAnimationFrame(draw);
        }
        
        // 启动渲染循环
        draw();
    </script>
</body>
</html>
