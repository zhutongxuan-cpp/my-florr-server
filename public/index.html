<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>My Florr.io - 多人联机版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #181818; }
        canvas { display: block; }
    </style>
</head>
<body oncontextmenu="return false;">
    <canvas id="gameCanvas"></canvas>

    <!-- 引入 Socket.io 客户端库 -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 🌟 1. 加载玩家本体图片 🌟
        const playerImg = new Image();
        playerImg.src = '/img/player.png'; // 指向你刚才保存的 public/img/player.png

        // 连接到服务器
        const socket = io();
        let otherPlayers = {}; // 存储服务器发来的其他玩家数据

        // 接收全服游戏状态
        socket.on('gameState', (serverPlayers) => {
            otherPlayers = serverPlayers;
        });

        // 🌺 我的本地玩家数据
        const player = {
            screenX: canvas.width / 2,
            screenY: canvas.height / 2,
            worldX: 0,
            worldY: 0,
            
            petalCount: 5,
            petalRadius: 10,
            normalDistance: 45,
            attackDistance: 90,
            defendDistance: 25,
            currentDistance: 45,
            targetDistance: 45,
            rotationAngle: 0,
            rotationSpeed: 0.05,

            maxSpeed: 6,
            maxMouseDist: 150,
            mouseX: canvas.width / 2,
            mouseY: canvas.height / 2
        };

        const mouseState = { left: false, right: false };

        window.addEventListener('mousemove', (e) => {
            player.mouseX = e.clientX;
            player.mouseY = e.clientY;
        });

        function updateStance() {
            if (mouseState.left) player.targetDistance = player.attackDistance;
            else if (mouseState.right) player.targetDistance = player.defendDistance;
            else player.targetDistance = player.normalDistance;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) mouseState.left = true;
            if (e.button === 2) mouseState.right = true;
            updateStance();
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouseState.left = false;
            if (e.button === 2) mouseState.right = false;
            updateStance();
        });

        // 画网格背景
        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 2;
            const gridSize = 50;
            const offsetX = -player.worldX % gridSize;
            const offsetY = -player.worldY % gridSize;

            ctx.beginPath();
            for (let x = offsetX - gridSize; x < canvas.width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            for (let y = offsetY - gridSize; y < canvas.height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        // 绘制任意玩家（复用代码，用来画自己和别人）
        function drawPlayer(x, y, pData, isMe) {
            // 画花瓣 (这里还是圆圈，等你有了花瓣贴图可以像下面一样改)
            for (let i = 0; i < pData.petalCount; i++) {
                const angle = pData.rotationAngle + (i * (Math.PI * 2) / pData.petalCount);
                const petalX = x + Math.cos(angle) * pData.currentDistance;
                const petalY = y + Math.sin(angle) * pData.currentDistance;

                ctx.beginPath();
                ctx.arc(petalX, petalY, 10, 0, Math.PI * 2); 
                ctx.fillStyle = isMe ? '#FF69B4' : '#FF8C00'; 
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#000';
                ctx.stroke();
            }

            // 🌟 2. 画本体 (替换成了贴图) 🌟
            // 如果图片加载完成了才画，避免报错
            if (playerImg.complete) {
                const imgSize = 40; // 因为你原来的圆半径是20，所以宽高设定为40
                // drawImage 参数: (图片对象, X坐标, Y坐标, 宽度, 高度)
                // x - imgSize/2 和 y - imgSize/2 是为了让图片的中心点对准坐标(x, y)
                ctx.drawImage(playerImg, x - imgSize / 2, y - imgSize / 2, imgSize, imgSize);
            } else {
                // 如果图片还没加载完，先画个原来的圆圈占位
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2); 
                ctx.fillStyle = isMe ? '#FFD700' : '#00BFFF'; 
                ctx.fill();
                ctx.stroke();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 本地玩家物理逻辑更新
            const dx = player.mouseX - player.screenX;
            const dy = player.mouseY - player.screenY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 0) {
                const speedRatio = Math.min(dist / player.maxMouseDist, 1);
                const currentSpeed = player.maxSpeed * speedRatio;
                player.worldX += (dx / dist) * currentSpeed;
                player.worldY += (dy / dist) * currentSpeed;
            }

            player.rotationAngle += player.rotationSpeed;
            player.currentDistance += (player.targetDistance - player.currentDistance) * 0.15;

            // 发送我的最新状态给服务器
            socket.emit('playerUpdate', {
                worldX: player.worldX,
                worldY: player.worldY,
                currentDistance: player.currentDistance,
                rotationAngle: player.rotationAngle
            });

            // 2. 开始渲染世界
            drawGrid();

            // 绘制半透明引导箭头
            if (dist > 10) {
                ctx.save();
                const lineLength = dist; 
                const angle = Math.atan2(dy, dx);

                ctx.translate(player.screenX, player.screenY);
                ctx.rotate(angle);

                const shaftWidth = 6;
                const headWidth = 20;
                const actualHeadLength = Math.min(18, lineLength); 
                const shaftLength = lineLength - actualHeadLength;

                ctx.beginPath();
                ctx.moveTo(0, -shaftWidth / 2);
                ctx.lineTo(shaftLength, -shaftWidth / 2);
                ctx.lineTo(shaftLength, -headWidth / 2);
                ctx.lineTo(lineLength, 0); 
                ctx.lineTo(shaftLength, headWidth / 2);
                ctx.lineTo(shaftLength, shaftWidth / 2);
                ctx.lineTo(0, shaftWidth / 2);
                ctx.closePath();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.fill();
                ctx.restore();
            }

            // 3. 渲染所有在线玩家
            for (let id in otherPlayers) {
                const p = otherPlayers[id];

                if (id === socket.id) {
                    drawPlayer(player.screenX, player.screenY, player, true);
                } else {
                    const drawX = player.screenX + (p.worldX - player.worldX);
                    const drawY = player.screenY + (p.worldY - player.worldY);
                    
                    if (drawX > -100 && drawX < canvas.width + 100 &&
                        drawY > -100 && drawY < canvas.height + 100) {
                        drawPlayer(drawX, drawY, p, false);
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        socket.on('connect', () => {
            gameLoop();
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.screenX = canvas.width / 2;
            player.screenY = canvas.height / 2;
        });
    </script>
</body>
</html>
