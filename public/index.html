<!DOCTYPE html>
<html>
<head>
    <title>花瓣网游</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #222; color: white; margin: 0;}
        /* 登录框样式 */
        #login-box { margin-top: 100px; }
        input { padding: 10px; margin: 5px; font-size: 16px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px;}
        button.reg { background: #2196F3; }
        /* 游戏画布样式 */
        #game-canvas { background-color: #e0f7fa; display: none; margin: 20px auto; border: 5px solid #fff; border-radius: 10px;}
    </style>
</head>
<body>

    <!-- 登录界面 -->
    <div id="login-box">
        <h1>🌸 花瓣世界 🌸</h1>
        <p style="color:red; font-size: 12px;">(测试版：请勿使用自己真实的常用密码)</p>
        <input id="user" type="text" placeholder="账号"><br>
        <input id="pass" type="password" placeholder="密码"><br>
        <button onclick="login()">登 录</button>
        <button class="reg" onclick="register()">注 册</button>
        <p id="msg"></p>
    </div>

    <!-- 游戏画面 (初始隐藏) -->
    <canvas id="game-canvas" width="800" height="600"></canvas>

    <!-- 引入 Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // UI 元素
        const loginBox = document.getElementById('login-box');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');

        // 登录/注册动作
        function login() {
            socket.emit('login', { user: user.value, password: pass.value, username: user.value });
            msg.innerText = "正在登录...";
        }
        function register() {
            socket.emit('register', { user: user.value, password: pass.value, username: user.value });
            msg.innerText = "正在注册...";
        }

        // 监听服务器报错
        socket.on('loginError', (errorText) => {
            msg.innerText = errorText;
            msg.style.color = "pink";
        });

        // 游戏核心变量
        let myName = "";
        let myX = 0, myY = 0;
        let otherPlayers = {}; // 存放其他所有人的数据
        const speed = 5; // 移动速度

        // 监听按键状态
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // 【登录成功！进入游戏】
        socket.on('loginSuccess', (userData) => {
            loginBox.style.display = "none"; // 隐藏登录框
            canvas.style.display = "block";  // 显示游戏画面
            myName = userData.username;
            myX = userData.x;
            myY = userData.y;
            
            // 启动游戏画面刷新循环
            requestAnimationFrame(gameLoop);
        });

        // 【接收服务器发来的所有人坐标】
        socket.on('stateUpdate', (serverPlayers) => {
            otherPlayers = serverPlayers;
        });

        // 【游戏主循环：移动与绘画】
        function gameLoop() {
            // 1. 处理自己的移动 (WASD 或 方向键)
            let moved = false;
            if (keys['KeyW'] || keys['ArrowUp']) { myY -= speed; moved = true; }
            if (keys['KeyS'] || keys['ArrowDown']) { myY += speed; moved = true; }
            if (keys['KeyA'] || keys['ArrowLeft']) { myX -= speed; moved = true; }
            if (keys['KeyD'] || keys['ArrowRight']) { myX += speed; moved = true; }

            // 限制不要跑出屏幕边界
            if(myX < 20) myX = 20; if(myX > 780) myX = 780;
            if(myY < 20) myY = 20; if(myY > 580) myY = 580;

            // 2. 如果移动了，就告诉服务器自己的新坐标
            if (moved) {
                socket.emit('move', { x: myX, y: myY });
            }

            // 3. 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 4. 遍历画出所有人
            for (let id in otherPlayers) {
                let p = otherPlayers[id];
                
                // 画圆圈代表玩家 (别人是红色，自己是蓝色)
                ctx.beginPath();
                ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
                ctx.fillStyle = (p.username === myName) ? "#4CAF50" : "#F44336"; 
                ctx.fill();
                ctx.stroke();

                // 画名字 (在头顶上)
                ctx.fillStyle = "black";
                ctx.font = "16px Arial";
                ctx.textAlign = "center";
                ctx.fillText(p.username, p.x, p.y - 30);
            }

            // 疯狂循环这一帧
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
