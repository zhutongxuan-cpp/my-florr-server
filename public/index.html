<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>My Florr.io</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 🌺 1. 扩充玩家对象：加入花瓣的各种属性
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,          // 本体半径
            color: '#FFD700',    // 本体颜色（金黄）
            targetX: canvas.width / 2,
            targetY: canvas.height / 2,

            // --- 新增：花瓣属性 ---
            petalCount: 5,           // 花瓣数量
            petalRadius: 10,         // 花瓣大小
            baseDistance: 40,        // 防守姿态的距离
            attackDistance: 80,      // 攻击姿态的距离
            currentDistance: 40,     // 当前实际距离（用于动画平滑过渡）
            targetDistance: 40,      // 目标距离
            rotationAngle: 0,        // 当前的旋转角度
            rotationSpeed: 0.05      // 旋转速度（数字越大转得越快）
        };

        // 监听鼠标移动，控制本体走向
        window.addEventListener('mousemove', (e) => {
            player.targetX = e.clientX;
            player.targetY = e.clientY;
        });

        // ⚔️ 2. 监听鼠标点击，控制姿态切换
        // 按下鼠标：进入攻击姿态（展开）
        window.addEventListener('mousedown', () => {
            player.targetDistance = player.attackDistance;
        });

        // 松开鼠标：回到防守姿态（收缩）
        window.addEventListener('mouseup', () => {
            player.targetDistance = player.baseDistance;
        });

        // 游戏核心循环
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 本体平滑移动
            player.x += (player.targetX - player.x) * 0.05;
            player.y += (player.targetY - player.y) * 0.05;

            // ⚙️ 3. 更新花瓣的旋转角度和展开距离
            // 每一帧都增加一点角度，让它转起来
            player.rotationAngle += player.rotationSpeed;
            // 核心动画技巧：平滑插值 (Lerp)，让当前距离无限逼近目标距离
            player.currentDistance += (player.targetDistance - player.currentDistance) * 0.15;

            // 🌸 4. 绘制花瓣 (重点：使用三角函数)
            for (let i = 0; i < player.petalCount; i++) {
                // 计算当前花瓣的角度：把 360 度 (Math.PI * 2) 平分给几个花瓣
                const angle = player.rotationAngle + (i * (Math.PI * 2) / player.petalCount);

                // 根据角度和当前距离，计算花瓣的 X 和 Y 坐标位置
                const petalX = player.x + Math.cos(angle) * player.currentDistance;
                const petalY = player.y + Math.sin(angle) * player.currentDistance;

                // 画出花瓣
                ctx.beginPath();
                ctx.arc(petalX, petalY, player.petalRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#FF69B4'; // 花瓣颜色（骚粉色）
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#000';
                ctx.stroke();
            }

            // 🟡 5. 绘制玩家本体 (放在花瓣后面画，这样本体就会压在花瓣上面，更有层次感)
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#000';
            ctx.stroke();

            // 不断循环
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        gameLoop();

        // 窗口拉伸自适应
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
